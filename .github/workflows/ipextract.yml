name: IPTV IP 自动提取（每2小时）
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置时区为 中国北京时间
        run: sudo timedatectl set-timezone Asia/Shanghai

      # 进入 utils 目录运行脚本
      - name: 运行提取脚本
        run: |
          cd utils
          node extract.js

      # 提交 根目录 的 ip_all.json
      - name: 提交更新到仓库
        run: |
          git config --global user.name "Actions"
          git config --global user.email "actions@github.com"
          git add ip_all.json
          git commit -m "自动更新 IP 列表" || echo "无更新，跳过"
          git push
